    .bg-overlay {
      position:fixed; inset:0;
      background:linear-gradient(to bottom,rgba(10,22,40,0.55) 0%,rgba(10,22,40,0.3) 40%,rgba(10,22,40,0.78) 100%);
      z-index:1;
    }

    .app {
      position:relative; z-index:2;
      display:flex; flex-direction:column;
      height:100vh; max-width:820px;
      margin:0 auto; padding:0 16px;
    }

    /* Header */
    .header {
      padding:22px 0 16px;
      display:flex; align-items:center; gap:16px;
      border-bottom:1px solid var(--border);
      animation:fadeDown 0.7s ease both;
    }
    .logo-ring {
      width:52px; height:52px; border-radius:50%;
      border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      background:rgba(201,168,76,0.12); font-size:22px;
      box-shadow:0 0 18px rgba(201,168,76,0.3);
    }
    .header-text h1 {
      font-family:'Playfair Display',serif;
      font-size:1.45rem; color:var(--white);
    }
    .header-text p {
      font-size:0.78rem; color:var(--gold-light);
      letter-spacing:0.06em; text-transform:uppercase; opacity:0.85;
    }
    .status-dot {
      margin-left:auto; display:flex; align-items:center; gap:7px;
      font-size:0.75rem; color:#6fcf97;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background:#6fcf97; box-shadow:0 0 8px #6fcf97;
      animation:pulse 2s infinite;
    }

    /* Chat */
    .chat-area {
      flex:1; overflow-y:auto; padding:20px 0 10px;
      display:flex; flex-direction:column; gap:14px;
      scrollbar-width:thin; scrollbar-color:rgba(201,168,76,0.3) transparent;
    }
    .chat-area::-webkit-scrollbar { width:4px; }
    .chat-area::-webkit-scrollbar-thumb { background:rgba(201,168,76,0.3); border-radius:4px; }

    .welcome { text-align:center; padding:30px 20px 10px; animation:fadeUp 0.9s ease 0.3s both; opacity:0; animation-fill-mode:forwards; }
    .welcome h2 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--white); margin-bottom:8px; }
    .welcome p { font-size:0.88rem; color:rgba(255,255,255,0.55); max-width:420px; margin:0 auto; }
    .welcome-divider { width:60px; height:2px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:14px auto; }

    .msg { display:flex; gap:10px; max-width:88%; animation:msgIn 0.35s ease; }
    .msg.user { margin-left:auto; flex-direction:row-reverse; }
    .msg.bot  { margin-right:auto; }

    .avatar {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0; margin-top:2px;
    }
    .msg.user .avatar { background:rgba(201,168,76,0.25); border:1px solid rgba(201,168,76,0.5); }
    .msg.bot  .avatar { background:rgba(10,22,40,0.8); border:1px solid rgba(201,168,76,0.3); }

    .bubble {
      padding:12px 16px; border-radius:16px;
      font-size:0.9rem; line-height:1.6;
      backdrop-filter:blur(16px);
    }
    .msg.user .bubble {
      background:rgba(201,168,76,0.18);
      border:1px solid rgba(201,168,76,0.35);
      color:var(--white); border-radius:16px 4px 16px 16px;
    }
    .msg.bot .bubble {
      background:rgba(10,22,40,0.85);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.9); border-radius:4px 16px 16px 16px;
    }

    /* Sources */
    .sources {
      margin-top:8px; padding:8px 12px;
      background:rgba(201,168,76,0.08);
      border-left:3px solid var(--gold);
      border-radius:0 8px 8px 0;
      font-size:0.75rem; color:rgba(255,255,255,0.5);
      cursor:pointer;
    }
    .sources summary { color:var(--gold-light); font-weight:500; margin-bottom:4px; }
    .sources p { margin:2px 0; }

    /* Typing */
    .typing .bubble { display:flex; gap:5px; align-items:center; padding:14px 18px; }
    .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); opacity:0.7; animation:bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }

    /* Suggestions */
    .suggestions { display:flex; flex-wrap:wrap; gap:8px; padding:6px 0 4px; animation:fadeUp 1s ease 0.5s both; opacity:0; animation-fill-mode:forwards; }
    .chip {
      padding:7px 14px; border-radius:20px;
      background:var(--glass-light); border:1px solid var(--border);
      color:rgba(255,255,255,0.75); font-size:0.78rem; cursor:pointer;
      backdrop-filter:blur(10px); transition:all 0.2s ease;
      font-family:'DM Sans',sans-serif;
    }
    .chip:hover { background:rgba(201,168,76,0.2); border-color:var(--gold); color:var(--gold-light); transform:translateY(-1px); }

    /* RAG badge */
    .rag-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(111,207,151,0.15); border:1px solid rgba(111,207,151,0.3);
      color:#6fcf97; font-size:0.7rem; padding:3px 8px; border-radius:10px;
      margin-bottom:6px;
    }

    /* Input */
    .input-area { padding:14px 0 20px; border-top:1px solid var(--border); animation:fadeUp 0.7s ease 0.4s both; opacity:0; animation-fill-mode:forwards; }
    .input-row {
      display:flex; gap:10px; align-items:center;
      background:var(--glass); border:1px solid var(--border);
      border-radius:14px; padding:8px 8px 8px 18px;
      backdrop-filter:blur(20px); transition:border-color 0.2s;
    }
    .input-row:focus-within { border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,0.15); }
    #user-input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--white); font-size:0.92rem; font-family:'DM Sans',sans-serif;
    }
    #user-input::placeholder { color:rgba(255,255,255,0.35); }
    .send-btn {
      width:40px; height:40px; border-radius:10px;
      background:linear-gradient(135deg,var(--gold),#a07830);
      border:none; cursor:pointer; font-size:17px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s ease;
    }
    .send-btn:hover { transform:scale(1.07); box-shadow:0 4px 16px rgba(201,168,76,0.4); }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes msgIn    { from{opacity:0;transform:translateY(10px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes pulse    { 0%,100%{opacity:1;box-shadow:0 0 8px #6fcf97} 50%{opacity:0.5} }
    @keyframes bounce   { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="app">
  <div class="header">
    <div class="logo-ring">🎓</div>
    <div class="header-text">
      <h1>INSAT Assistant Made by Mohamed Ezer </h1>
      <p>Institut National des Sciences Appliquées et de Technologie</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="welcome">
      <h2>Bienvenue à l'INSAT - Mar7be fel INSAT </h2>
      <div class="welcome-divider"></div>
      <p>Posez vos questions - as2al ay sou2el.</p>
      <br/>
      <span class="rag-badge">⚡ Powered by BM25 RAG + LangChain + Groq</span>
    </div>
    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="sendChip(this)">What is INSAT?</button>
      <button class="chip" onclick="sendChip(this)">Engineering programs?</button>
      <button class="chip" onclick="sendChip(this)">International partnerships?</button>
      <button class="chip" onclick="sendChip(this)">Quels diplômes propose l'INSAT ?</button>
      <button class="chip" onclick="sendChip(this)">Who is the director?</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input id="user-input" type="text"
        placeholder="Ask anything about INSAT (EN / FR / AR)..."
        onkeydown="if(event.key==='Enter') sendMessage()" autocomplete="off"/>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chat-area');
  const input    = document.getElementById('user-input');
  const SERVER   = 'http://localhost:5000/chat'; // Flask server

  // Check server connection
  fetch('http://localhost:5000/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:'ping'})})
    .then(() => { document.getElementById('status-text').textContent = 'En ligne'; document.querySelector('.dot').style.background = '#6fcf97'; })
    .catch(() => { document.getElementById('status-text').textContent = 'Serveur offline'; document.querySelector('.dot').style.background = '#eb5757'; });

  function addMsg(text, role) {
    const sugg = document.getElementById('suggestions');
    if (sugg) sugg.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="avatar">${role==='user'?'🧑':'🤖'}</div><div class="bubble">${text}</div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing'; div.id = 'typing';
    div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg(text, 'user');
    addTyping();

    try {
      const res  = await fetch(SERVER, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: text})
      });
      const data = await res.json();
      removeTyping();

      // Answer bubble
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg bot';
      msgDiv.style.animation = 'msgIn 0.35s ease';

      // Sources dropdown
      const sourcesHTML = data.sources
        ? `<details class="sources"><summary>📚 ${data.sources.length} chunks retrieved (BM25 RAG)</summary>${data.sources.map((s,i)=>`<p>[${i+1}] ${s}</p>`).join('')}</details>`
        : '';

      msgDiv.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble">${data.answer || data.error}</div>${sourcesHTML}</div>`;
      chatArea.appendChild(msgDiv);
      chatArea.scrollTop = chatArea.scrollHeight;

    } catch(err) {
      removeTyping();
      addMsg('⚠️ Cannot reach the Flask server. Make sure app.py is running!', 'bot');
    }
  }

  function sendChip(btn) { input.value = btn.textContent; sendMessage(); }
</script>
</body>
</html>
